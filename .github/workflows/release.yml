name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub release tag to upload assets to
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: scope2000
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            artifact: windows-x64
          - label: Linux x64
            os: ubuntu-latest
            artifact: linux-x64
          - label: macOS
            os: macos-latest
            artifact: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo build data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release asset
        id: package
        shell: pwsh
        run: |
          $safeTag = $env:RELEASE_TAG -replace '[^A-Za-z0-9_.-]', '-'
          $assetBase = "$env:APP_NAME-$safeTag-${{ matrix.artifact }}"
          $packageDir = Join-Path "dist" $assetBase
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          if ($IsWindows) {
            Copy-Item "target/release/$env:APP_NAME.exe" (Join-Path $packageDir "$env:APP_NAME.exe")
            $assetPath = "dist/$assetBase.zip"
            Compress-Archive -Path "$packageDir/*" -DestinationPath $assetPath -Force
          } else {
            Copy-Item "target/release/$env:APP_NAME" (Join-Path $packageDir $env:APP_NAME)
            chmod +x (Join-Path $packageDir $env:APP_NAME)
            $assetPath = "dist/$assetBase.tar.gz"
            tar -czf $assetPath -C dist $assetBase
          }

          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Stash release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: ${{ steps.package.outputs.asset_path }}
          retention-days: 1

  publish:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: pwsh
        run: |
          $assets = Get-ChildItem -Path dist -File -Recurse |
            Sort-Object Name

          $assetPaths = $assets | ForEach-Object { $_.FullName }

          $releaseTitle = "Scope2000 $env:RELEASE_TAG"
          $releaseExists = $false
          try {
            gh release view "$env:RELEASE_TAG" *> $null
            $releaseExists = $LASTEXITCODE -eq 0
          } catch {
            $releaseExists = $false
          }

          if ($releaseExists) {
            gh release upload "$env:RELEASE_TAG" @assetPaths --clobber
          } else {
            gh release create "$env:RELEASE_TAG" @assetPaths `
              --title $releaseTitle `
              --notes $releaseTitle
          }
